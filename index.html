<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Sistema de Avaliação Grafomotora</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-image: url('fundo.jpg'); /* fundo estético */
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    h1 {
      color: #333;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #telaCaptura {
      display: none;
    }

    #area {
      margin: 20px auto;
      border: 2px solid #000;
      touch-action: none;
      width: 800px;
      height: 500px;
      background: #fff;
      border-radius: 8px;
      display: block;
    }

    #estatisticas {
      margin-top: 20px;
      font-size: 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      text-align: left;
      background: #f9fafb;
      padding: 15px;
      border-radius: 8px;
    }

    #estatisticas p {
      margin: 4px 0;
    }

    #botoesCaptura {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container" id="telaCadastro">
    <h1>Cadastro do Paciente</h1>
    <label>Nome</label>
    <input type="text" id="nome">
    <label>Idade</label>
    <input type="number" id="idade">
    <label>Sexo</label>
    <select id="sexo">
      <option>Masculino</option>
      <option>Feminino</option>
      <option>Outro</option>
    </select>
    <label>Mão Dominante</label>
    <select id="mao">
      <option>Direita</option>
      <option>Esquerda</option>
      <option>Ambidestro</option>
    </select>
    <label>Diagnóstico / Suspeita Clínica</label>
    <input type="text" id="diagnostico">
    <label>Observações</label>
    <textarea id="obs"></textarea>
    <button onclick="iniciarTeste()">Iniciar Teste</button>
  </div>

  <div class="container" id="telaCaptura">
    <h1>Captura de Escrita</h1>
    <p>Escreva na área abaixo:</p>
    <canvas id="area"></canvas>

    <div id="estatisticas">
      <p><b>Tempo de Escrita:</b> <span id="tempo">0</span> s</p>
      <p><b>Velocidade Média:</b> <span id="velMedia">0</span></p>
      <p><b>Pressão Média:</b> <span id="pressMedia">0</span></p>
      <p><b>Total de Pontos:</b> <span id="totalPontos">0</span></p>
      <p><b>Pen Lifts:</b> <span id="penLifts">0</span></p>
    </div>

    <div id="botoesCaptura">
      <button onclick="limparTudo()">Limpar Escrita</button>
      <button onclick="baixarCSV()">Baixar CSV</button>
      <button onclick="baixarImagem()">Baixar Imagem</button>
      <button onclick="alternarFundo()">Alternar Fundo Pontilhado</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
